<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Natural Brows — PMU Color Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--surface:#161616;--surface2:#1C1C1C;--surface3:#222;
  --border:#2A2A2A;--border-light:#383838;
  --text:#E8E4DF;--text-dim:#9A9490;--text-muted:#555;
  --gold:#C9A96E;--gold-dim:rgba(201,169,110,.15);
  --cool:#7BAEC4;--warm:#C4936A;
  --green:#6AAF8A;--green-dim:rgba(106,175,138,.12);
  --lip:#C47080;--eyeliner:#6A8EC4;--brow:#A08060;--hairline:#8090A0;
  --font-d:'Cormorant Garamond',serif;--font-b:'DM Sans',sans-serif;
  --r:10px;--rs:5px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── Header ──────────────────────────────────────── */
header{padding:40px 40px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.brand-mark{font-family:var(--font-d);font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.brand-title{font-family:var(--font-d);font-size:32px;font-weight:300;letter-spacing:.02em;line-height:1}
.brand-title em{font-style:italic;color:var(--text-dim)}
.header-meta{font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-align:right;line-height:1.8}

/* ─── Category Bar ────────────────────────────────── */
.cat-bar{display:flex;align-items:center;gap:7px;padding:14px 40px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.bar-label{font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-right:4px;white-space:nowrap}
.cat-btn{background:none;border:1px solid var(--border);cursor:pointer;font-family:var(--font-b);font-size:10.5px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:5px 13px;border-radius:20px;transition:all .2s;display:flex;align-items:center;gap:5px}
.cat-btn:hover{color:var(--text-dim);border-color:var(--border-light)}
.cat-btn.active{color:#0D0D0D;border-color:transparent;font-weight:500}
.cat-btn[data-cat="all"].active{background:#777}
.cat-btn[data-cat="Lip Color"].active{background:var(--lip)}
.cat-btn[data-cat="Brow Color"].active{background:var(--brow)}
.cat-btn[data-cat="Eyeliner Color"].active{background:var(--eyeliner)}
.cat-btn[data-cat="Hairline Color"].active{background:var(--hairline)}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-lip{background:var(--lip)}.dot-brow{background:var(--brow)}
.dot-eyeliner{background:var(--eyeliner)}.dot-hairline{background:var(--hairline)}

/* ─── Filter Row ──────────────────────────────────── */
.filter-row{display:flex;align-items:center;gap:8px;padding:12px 40px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:170px;max-width:280px}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px 7px 30px;font-family:var(--font-b);font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--border-light)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;display:none;line-height:1}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:none;border:1px solid var(--border);cursor:pointer;font-family:var(--font-b);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);padding:3px 11px;border-radius:20px;transition:all .2s}
.chip:hover{color:var(--text-dim);border-color:var(--border-light)}
.chip.active{background:var(--surface2);border-color:var(--border-light);color:var(--text)}
.chip[data-filter="stock"][data-val="in"].active  {background:rgba(106,175,138,.15);border-color:rgba(106,175,138,.4);color:var(--green)}
.chip[data-filter="stock"][data-val="out"].active {background:rgba(160,140,130,.1);border-color:var(--border-light);color:var(--text-dim)}
.chip[data-filter="stock"][data-val="wish"].active{background:rgba(201,169,110,.15);border-color:rgba(201,169,110,.35);color:var(--gold)}
.filter-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}

/* ─── Tab Nav ─────────────────────────────────────── */
.tab-nav{display:flex;gap:2px;padding:16px 40px 0}
.tab-btn{background:none;border:none;cursor:pointer;font-family:var(--font-b);font-size:10.5px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:8px 20px;border-radius:var(--rs) var(--rs) 0 0;border:1px solid transparent;border-bottom:none;transition:all .2s;position:relative;top:1px}
.tab-btn:hover{color:var(--text-dim)}
.tab-btn.active{color:var(--gold);border-color:var(--border);background:var(--surface)}
.tab-line{border-top:1px solid var(--border);margin:0 40px}

/* ─── Main ────────────────────────────────────────── */
main{padding:24px 40px 80px}
.tab-panel{display:none}.tab-panel.active{display:block}
.result-info{font-size:10.5px;color:var(--text-muted);margin-bottom:18px;letter-spacing:.04em}
.result-info span{color:var(--gold)}

/* ─── Section groups ──────────────────────────────── */
.sg{margin-bottom:36px}
.sg-title{font-family:var(--font-d);font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sg-title::before{content:'';width:14px;height:1px;background:var(--border-light)}
.sg-title::after{content:'';flex:1;height:1px;background:var(--border)}
.sub-label{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin:18px 0 10px;padding-left:1px;opacity:.7}

/* ═══════════════════════════════════════════════════
   SIMPLE CHART — card grid
═══════════════════════════════════════════════════ */
.simple-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:6px}

.sc-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color .2s;
  position:relative;
}
.sc-card:hover{border-color:var(--border-light)}

/* stock row accent */
.sc-card.sc-in  {border-left:3px solid var(--green)}
.sc-card.sc-wish{border-left:3px solid var(--gold)}

/* ── Card top banner ─── */
.sc-banner{display:flex;align-items:stretch;min-height:72px}

.sc-swatch{
  width:72px;flex-shrink:0;
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:8px 6px;
  gap:4px;
}
.sc-swatch::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.14),transparent 60%);pointer-events:none}
.sc-hex{font-family:monospace;font-size:8px;color:rgba(255,255,255,.45);letter-spacing:.02em;position:relative;z-index:1;text-align:center}

.sc-head{flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:center;gap:5px}
.sc-name{font-family:var(--font-d);font-size:19px;font-weight:300;line-height:1;letter-spacing:.01em}
.sc-name-ko{font-size:10.5px;color:var(--text-muted);margin-top:1px}
.sc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}

/* ── Card body ─── */
.sc-body{
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
}

.sc-col{
  padding:11px 13px;
  display:flex;flex-direction:column;gap:8px;
  border-right:1px solid var(--border);
}
.sc-col:last-child{border-right:none}
.sc-col-full{
  padding:11px 13px;
  grid-column:1/-1;
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}

/* field label + value */
.field{display:flex;flex-direction:column;gap:2px}
.field-lbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
.field-val{font-size:11.5px;color:var(--text-dim);line-height:1.45}
.field-val.mono{font-family:'Courier New',monospace;font-size:10px;color:var(--text-muted)}

/* tone strip (masstone/midtone/basetone) */
.tone-strip{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tone-swatch{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:44px;
}
.tone-circle{
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  position:relative;
}
.tone-circle::after{content:'';position:absolute;inset:2px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.15),transparent)}
.tone-lbl{font-size:8px;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}
.tone-name{font-size:9.5px;color:var(--text-dim);text-align:center;line-height:1.3}
.tone-arrow{color:var(--border-light);font-size:14px;margin:0 1px;align-self:center;margin-top:-12px}

/* CI list */
.ci-stack{display:flex;flex-direction:column;gap:3px}
.ci-item{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--surface2);border-radius:3px;padding:3px 8px}
.ci-name{font-size:10px;color:var(--text-dim)}
.ci-num{font-family:'Courier New',monospace;font-size:9.5px;color:var(--text-muted)}

/* stock control */
.stock-row{display:flex;align-items:center;gap:7px}
.stock-check{appearance:none;-webkit-appearance:none;width:15px;height:15px;border:1px solid var(--border-light);border-radius:3px;background:var(--surface2);cursor:pointer;position:relative;flex-shrink:0;transition:all .18s}
.stock-check:checked{background:var(--green);border-color:var(--green)}
.stock-check:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:#0D0D0D;font-weight:700}
.stock-check:hover:not(:checked){border-color:#555}
.stock-star{background:none;border:none;cursor:pointer;font-size:12px;line-height:1;color:var(--border-light);transition:all .18s;padding:1px;flex-shrink:0}
.stock-star.wished{color:var(--gold)}
.stock-star:hover{color:var(--gold);transform:scale(1.15)}
.stock-badge{font-size:9px;padding:2px 8px;border-radius:20px;letter-spacing:.05em;white-space:nowrap}
.badge-in  {background:rgba(106,175,138,.15);color:var(--green);border:1px solid rgba(106,175,138,.3)}
.badge-out {background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.badge-wish{background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.25)}

/* tags */
.tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:400;letter-spacing:.05em;white-space:nowrap;display:inline-block}
.tag-main  {background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.2)}
.tag-mixer {background:rgba(140,140,160,.1);color:#9898B0;border:1px solid rgba(140,140,160,.2)}
.tag-corr  {background:rgba(196,100,80,.1);color:#C47060;border:1px solid rgba(196,100,80,.2)}
.tag-neut  {background:rgba(123,174,196,.1);color:var(--cool);border:1px solid rgba(123,174,196,.2)}
.tag-warm-t{background:rgba(196,147,106,.1);color:var(--warm);border:1px solid rgba(196,147,106,.2)}
.tag-cool-t{background:rgba(123,174,196,.1);color:var(--cool);border:1px solid rgba(123,174,196,.2)}
.tag-neut-t{background:rgba(160,150,140,.1);color:#A09080;border:1px solid rgba(160,150,140,.18)}
.tag-blend {background:rgba(160,160,180,.08);color:#9090A8;border:1px solid rgba(160,160,180,.18)}
.tag-org   {background:rgba(196,147,106,.08);color:#B09070;border:1px solid rgba(196,147,106,.18)}
.tag-op-L  {background:rgba(180,180,180,.06);color:#808080;border:1px solid rgba(180,180,180,.15)}
.tag-op-M  {background:rgba(180,180,180,.09);color:#909090;border:1px solid rgba(180,180,180,.2)}
.tag-op-H  {background:rgba(220,200,180,.1);color:#A8A090;border:1px solid rgba(220,200,180,.2)}

/* best-use pills */
.pill-row{display:flex;flex-wrap:wrap;gap:4px}
.pill{font-size:9.5px;padding:3px 10px;border-radius:20px;background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.2)}

/* ═══════════════════════════════════════════════════
   PRO DETAIL — enhanced cards
═══════════════════════════════════════════════════ */
.pro-grid{display:grid;gap:16px}

.pro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s}
.pro-card:hover{border-color:var(--border-light)}
.pro-card.sc-in  {border-left:3px solid var(--green)}
.pro-card.sc-wish{border-left:3px solid var(--gold)}

.pro-banner{display:flex;align-items:stretch;min-height:90px;position:relative;overflow:hidden}
.pro-clr{width:110px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px;position:relative}
.pro-clr::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.13),transparent 60%);pointer-events:none}
.pro-hex{font-family:monospace;font-size:8.5px;color:rgba(255,255,255,.45);position:relative;z-index:1}
.pro-hl{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:7px 5px;border-left:1px solid rgba(255,255,255,.05);position:relative}
.pro-hl::before{content:'HEALED';position:absolute;top:6px;font-size:6.5px;letter-spacing:.15em;color:rgba(255,255,255,.2)}
.hl-dot{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.1);margin-top:12px}
.hl-txt{font-size:8.5px;color:rgba(255,255,255,.28);text-align:center;line-height:1.3}
.pro-info{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.pro-name{font-family:var(--font-d);font-size:22px;font-weight:300;line-height:1.05}
.pro-name-ko{font-size:10px;color:var(--text-muted)}
.pro-tags{display:flex;flex-wrap:wrap;gap:4px}
.pro-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);cursor:pointer;padding:6px;border-radius:50%;transition:all .2s;user-select:none;line-height:1}
.pro-toggle:hover{color:var(--gold);background:rgba(201,169,110,.08)}

.pro-body{border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.pro-body.collapsed{display:none}

.pro-sec{padding:12px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.pro-sec:last-child{border-right:none}
.pro-sec-full{padding:12px 14px;grid-column:1/-1;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.pro-sec-2{grid-column:span 2;border-right:1px solid var(--border)}

.sec-lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

.skin-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.skin-item{background:var(--surface2);border-radius:3px;padding:6px 8px;display:flex;flex-direction:column;gap:1px}
.skin-type{font-size:8.5px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase}
.skin-stars{font-size:10px;color:var(--gold)}

.mix-item{background:var(--surface2);border-radius:var(--rs);padding:7px 10px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mix-ratio{font-family:var(--font-d);font-size:14px;color:var(--gold);min-width:28px}
.mix-info{display:flex;flex-direction:column;gap:1px}
.mix-colors{font-size:10.5px;color:var(--text-dim)}
.mix-effect{font-size:10px;color:var(--text-muted)}

.caution-box{background:rgba(196,100,80,.07);border:1px solid rgba(196,100,80,.18);border-radius:var(--rs);padding:8px 11px;font-size:11px;color:#C49080;line-height:1.6}
.note-box{background:var(--surface2);border-radius:var(--rs);padding:8px 11px;font-size:11px;color:var(--text-dim);line-height:1.6}

/* ─── Empty ───────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:12px;line-height:2}
.empty-icon{font-size:24px;opacity:.2;margin-bottom:10px}

@media(max-width:680px){
  .simple-grid{grid-template-columns:1fr}
  .sc-body{grid-template-columns:1fr}
  .sc-col{border-right:none;border-bottom:1px solid var(--border)}
  .pro-body{grid-template-columns:1fr}
  .pro-sec{border-right:none;border-bottom:1px solid var(--border)}
  .pro-sec-2{grid-column:1}
  header,.cat-bar,.filter-row,.tab-nav,main{padding-left:18px;padding-right:18px}
  .tab-line{margin:0 18px}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ─── Pro Accordion sections ─────────────────────────── */
.acc-section{border-top:1px solid var(--border)}
.acc-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.acc-header:hover{background:rgba(255,255,255,.02)}
.acc-title{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:7px}
.acc-title::before{content:'';width:8px;height:1px;background:var(--gold-dim)}
.acc-arrow{font-size:12px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{display:none;padding:0 14px 14px}
.acc-body.open{display:block}

/* raw text block */
.raw-text{
  font-size:11.5px;color:var(--text-dim);line-height:1.85;
  white-space:pre-wrap;word-break:break-word;
  background:var(--surface2);border-radius:var(--rs);
  padding:11px 13px;
  font-family:var(--font-b);
}

/* pro-body new layout: single column of sections */
.pro-body-v2{border-top:1px solid var(--border);display:flex;flex-direction:column}
.pro-body-v2.collapsed{display:none}
.pro-top-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.pro-top-cell{padding:12px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.pro-top-cell:last-child{border-right:none}

/* ─── Card image thumbnail ───────────────────────────── */
/* ─── Tone image (replaces circle chips) ─────────────── */
.tone-img-wrap{
  display:flex;
  align-items:flex-start;
  gap:12px;
}
.tone-img-box{
  width:140px;
  height:140px;
  flex-shrink:0;
  border-radius:10px;
  overflow:hidden;
  background:var(--surface2);
  border:1px solid var(--border);
  position:relative;
}
.tone-img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
}
.tone-img-placeholder{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  color:var(--text-muted);
  letter-spacing:.08em;
  text-align:center;
  padding:8px;
}
.tone-labels{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
  justify-content:center;
  min-width:0;
}
.tone-label-row{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.tone-lbl-key{
  font-size:8px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  gap:6px;
}
.tone-lbl-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}
.tone-lbl-val{
  font-size:11px;
  color:var(--text-dim);
  padding-left:16px;
  line-height:1.3;
}


/* ═══════════════════════════════════════════════════
   ADMIN EDITOR — user editable manager
═══════════════════════════════════════════════════ */
.admin-fab{z-index:2147483647!important;
  position:fixed;right:18px;bottom:18px;z-index:9999;
  background:var(--gold);color:#0D0D0D;border:none;border-radius:999px;

// ════════════════════════════════════════════════════════════
//  STOCK — localStorage
// ════════════════════════════════════════════════════════════
const STOCK_KEY = 'nb_pmu_stock_v1';
function loadStock(){ try{ return JSON.parse(localStorage.getItem(STOCK_KEY))||{}; }catch{ return {}; } }
function saveStock(d){ try{ localStorage.setItem(STOCK_KEY,JSON.stringify(d)); }catch{} }
let stockData = loadStock();
function getStock(id){ return stockData[id]||'out'; }
function setStock(id,val){ stockData[id]=val; saveStock(stockData); }

function onCheckChange(id, checked){
  setStock(id, checked ? 'in' : 'out');
  refreshStock(id);
}
function onStarClick(id){
  setStock(id, getStock(id)==='wish' ? 'out' : 'wish');
  refreshStock(id);
}

function refreshStock(id){
  const s = getStock(id);
  // update sc-card
  const sc = document.getElementById(`sc-${id}`);
  if(sc){ sc.className = `sc-card${s==='in'?' sc-in':s==='wish'?' sc-wish':''}`; }
  // update pro-card
  const pc = document.getElementById(`pc-${id}`);
  if(pc){ pc.className = `pro-card${s==='in'?' sc-in':s==='wish'?' sc-wish':''}`; }
  // update all checkboxes/stars/badges with this id
  document.querySelectorAll(`[data-stock-id="${id}"]`).forEach(el => {
    if(el.classList.contains('stock-check'))  el.checked = (s==='in');
    if(el.classList.contains('stock-star'))   el.className = 'stock-star'+(s==='wish'?' wished':'');
    if(el.classList.contains('stock-badge')){
      el.className = 'stock-badge '+(s==='in'?'badge-in':s==='wish'?'badge-wish':'badge-out');
      el.textContent = s==='in'?'보유중':s==='wish'?'구매예정':'없음';
    }
  });
  if(state.stock) render();
}

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let state = { cat:'all', search:'', temp:null, opacity:null, subtype:null, brand:null, stock:null };

function getFiltered(){
  const q = state.search.toLowerCase();
  return PMU_COLORS.filter(c => {
    if(!c.active) return false;
    if(state.cat !== 'all' && c.category !== state.cat) return false;
    if(q && !c.name.toLowerCase().includes(q) && !(c.nameKo||'').includes(q)) return false;
    if(state.temp){
      const t=(c.temperature||'').toLowerCase();
      if(state.temp==='neutral'){ if(!t.includes('neutral')) return false; }
      else { if(!t.startsWith(state.temp)) return false; }
    }
    if(state.opacity && c.opacity !== state.opacity) return false;
    if(state.subtype && c.subtype !== state.subtype) return false;
    if(state.brand   && c.brand   !== state.brand)   return false;
    if(state.stock   && getStock(c.id) !== state.stock) return false;
    return true;
  });
}

//  HELPERS
// ════════════════════════════════════════════════════════════
const CAT_ORDER     = ['Lip Color','Brow Color','Eyeliner Color','Hairline Color'];
const SUBTYPE_ORDER = ['Main','Support','Neutralizer'];
const TYPE_CLS  = { Main:'tag-main', Mixer:'tag-mixer', Corrector:'tag-corr', Neutralizer:'tag-neut' };
const TEMP_MAP  = { cool:'Cool', warm:'Warm', neutral:'Neutral', 'neutral-cool':'Neutral Cool', 'neutral-warm':'Neutral Warm' };
const TEMP_CLS  = { cool:'tag-cool-t', warm:'tag-warm-t', neutral:'tag-neut-t', 'neutral-cool':'tag-cool-t', 'neutral-warm':'tag-warm-t' };
const PIG_CLS   = { blend:'tag-blend', organic:'tag-org' };
const OP_CLS    = { L:'tag-op-L', M:'tag-op-M', H:'tag-op-H' };
const tl = t => TEMP_MAP[t]||t||'—';
const tc = t => TEMP_CLS[t]||'tag-neut-t';

function groupBy(colors, key, order){
  const map={};
  order.forEach(k=>{ map[k]=[]; });
  colors.forEach(c=>{ const k=c[key]||'Other'; (map[k]=map[k]||[]).push(c); });
  return order.map(k=>({key:k,items:map[k]||[]})).filter(g=>g.items.length);
}

function stockControl(id){
  const s = getStock(id);
  return `<div class="stock-row">
    <input class="stock-check" type="checkbox" data-stock-id="${id}" ${s==='in'?'checked':''} onchange="onCheckChange('${id}',this.checked)"/>
    <button class="stock-star${s==='wish'?' wished':''}" data-stock-id="${id}" onclick="onStarClick('${id}')" title="구매예정">⭐</button>
    <span class="stock-badge ${s==='in'?'badge-in':s==='wish'?'badge-wish':'badge-out'}" data-stock-id="${id}">${s==='in'?'보유중':s==='wish'?'구매예정':'없음'}</span>
  </div>`;
}

function toneStrip(c){
  // Build image box using DOM to avoid any string escaping issues
  const wrap = document.createElement('div');
  wrap.className = 'tone-img-wrap';

  // ── Image box ──
  const imgBox = document.createElement('div');
  imgBox.className = 'tone-img-box';

  if(c.imageUrl){
    const img = document.createElement('img');
    img.src = c.imageUrl;
    img.alt = c.name;          // textContent-safe — no HTML injection
    img.loading = 'lazy';
    const ph = document.createElement('div');
    ph.className = 'tone-img-placeholder';
    ph.style.display = 'none';
    ph.textContent = c.name;   // textContent: apostrophe/quotes safe
    img.addEventListener('error', function(){
      img.style.display = 'none';
      ph.style.display = 'flex';
    });
    imgBox.appendChild(img);
    imgBox.appendChild(ph);
  } else {
    imgBox.style.background = c.hex || 'var(--surface2)';
    const ph = document.createElement('div');
    ph.className = 'tone-img-placeholder';
    ph.textContent = c.name;
    imgBox.appendChild(ph);
  }
  wrap.appendChild(imgBox);

  // ── Tone labels ──
  const labelsDiv = document.createElement('div');
  labelsDiv.className = 'tone-labels';

  if(c.masstone){
    const tones = [
      {key:'Masstone', hex:c.masstone, val:c.mastoneName||'—'},
      {key:'Midtone',  hex:c.midtone,  val:c.midtoneName||'—'},
      {key:'Basetone', hex:c.basetone, val:c.bastoneName||'—'},
    ];
    tones.forEach(function(t){
      const row = document.createElement('div');
      row.className = 'tone-label-row';
      const key = document.createElement('div');
      key.className = 'tone-lbl-key';
      const dot = document.createElement('span');
      dot.className = 'tone-lbl-dot';
      dot.style.background = t.hex;
      key.appendChild(dot);
      key.appendChild(document.createTextNode(t.key));
      const val = document.createElement('div');
      val.className = 'tone-lbl-val';
      val.textContent = t.val;  // textContent: safe
      row.appendChild(key);
      row.appendChild(val);
      labelsDiv.appendChild(row);
    });
  } else {
    const na = document.createElement('span');
    na.style.cssText = 'font-size:10px;color:var(--text-muted)';
    na.textContent = '데이터 없음';
    labelsDiv.appendChild(na);
  }
  wrap.appendChild(labelsDiv);

  return wrap.outerHTML;
}

function ciList(c){
  if(!c.ciIngredients||!c.ciIngredients.length)
    return '<span style="font-size:10px;color:var(--text-muted)">공식 CI 미공개</span>';
  return `<div class="ci-stack">${c.ciIngredients.map(i=>
    `<div class="ci-item"><span class="ci-name">${safeText(i.name)}</span><span class="ci-num">${i.ci}</span></div>`
  ).join('')}</div>`;
}

function buildSimple(){
  const el = document.getElementById('simple-content');
  const colors = getFiltered();
  updateCount(colors.length);
  if(!colors.length){ el.innerHTML = emptyHTML(); return; }

  let html = '';
  groupBy(colors,'category',CAT_ORDER).forEach(({key:cat,items})=>{
    html += `<div class="sg"><div class="sg-title">${cat}</div>`;
    if(cat==='Lip Color'){
      groupBy(items,'subtype',SUBTYPE_ORDER).forEach(({key:sub,items:si})=>{
        html += `<div class="sub-label">${sub} Colors</div>`;
        html += `<div class="simple-grid">${si.map(c=>buildSimpleCard(c)).join('')}</div>`;
      });
    } else {
      html += `<div class="simple-grid">${items.map(c=>buildSimpleCard(c)).join('')}</div>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
}

function saveManagedColors(){
  try{ localStorage.setItem(ADMIN_DATA_KEY, JSON.stringify(PMU_COLORS)); }
  catch(e){ alert('저장 실패: 브라우저 저장공간을 확인해줘.'); }
}
function findColor(id){ return PMU_COLORS.find(c=>c.id===id) || PMU_COLORS[0]; }
function uniqueId(base){
  let id = String(base||'new-color').toLowerCase().trim()
    .replace(/[^a-z0-9가-힣]+/g,'-').replace(/^-+|-+$/g,'') || 'new-color';
  let out=id, n=2;
  while(PMU_COLORS.some(c=>c.id===out)) out = id+'-'+(n++);
  return out;
}
function linesToList(str){ return String(str||'').split('\\n').map(s=>s.trim()).filter(Boolean); }
function listToLines(arr){ return (arr||[]).join('\\n'); }
function ciToLines(arr){ return (arr||[]).map(x=>[x.name||'',x.ci||''].join(' | ')).join('\\n'); }
function linesToCi(str){
  return linesToList(str).map(line=>{
    const parts=line.split('|').map(s=>s.trim());
    return {name:parts[0]||'', ci:parts[1]||''};
  });
}
function mixToLines(arr){ return (arr||[]).map(x=>[x.colors||'',x.ratio||'',x.effect||''].join(' | ')).join('\\n'); }
function linesToMix(str){
  return linesToList(str).map(line=>{
    const parts=line.split('|').map(s=>s.trim());
    return {colors:parts[0]||'', ratio:parts[1]||'', effect:parts[2]||''};
  });
}

function v(id){ const el=document.getElementById('ae-'+id); return el ? el.value : ''; }
function saveEditor(){
  const old = findColor(editingId); if(!old) return;
  let next;
  const jsonText = v('json').trim();
  try{ next = jsonText ? JSON.parse(jsonText) : deepClone(old); }
  catch(e){ alert('전체 데이터 JSON 형식이 틀렸어. 쉼표/따옴표 확인해줘.'); return; }
  const oldId = old.id;
  next.active = v('active') === 'true';
  next.id = v('id').trim() || oldId;
  next.name = v('name'); next.nameKo = v('nameKo'); next.imageUrl = v('imageUrl');
  next.brand = v('brand'); next.collection = v('collection'); next.category = v('category'); next.subtype = v('subtype');
  next.type = v('type'); next.pigmentType = v('pigmentType'); next.temperature = v('temperature'); next.opacity = v('opacity');
  next.family = v('family'); next.tone = v('tone');
  next.hex = v('hex'); next.healedHex = v('healedHex'); next.masstone = v('masstone'); next.midtone = v('midtone'); next.basetone = v('basetone');
  next.mastoneName = v('mastoneName'); next.midtoneName = v('midtoneName'); next.bastoneName = v('bastoneName');
  next.bestUse = linesToList(v('bestUse'));
  next.ciIngredients = linesToCi(v('ciIngredients'));
  next.healedResult = v('healedResult'); next.caution = v('caution'); next.sessionNotes = v('sessionNotes');
  next.mixPairing = linesToMix(v('mixPairing'));
  next.skinMatch = {fair:v('skinFair'), medium:v('skinMedium'), olive:v('skinOlive'), dark:v('skinDark')};
  next.proData = v('proData');
  if(next.id !== oldId && PMU_COLORS.some(c=>c.id===next.id)){ alert('이미 같은 ID가 있어. ID를 다르게 써줘.'); return; }
  const idx = PMU_COLORS.findIndex(c=>c.id===oldId);
  PMU_COLORS[idx] = next;
  if(stockData[oldId] && next.id !== oldId){ stockData[next.id] = stockData[oldId]; delete stockData[oldId]; saveStock(stockData); }
  editingId = next.id;
  saveManagedColors();
  refreshAdminSelect();
  render();
  openEditor(next.id);
}
function addColor(){
  const id = uniqueId('new-color');
  const c = {active:true,id,imageUrl:'',name:'New Color',nameKo:'새 컬러',category:'Lip Color',subtype:'Main',type:'Main',brand:'',collection:'',pigmentType:'—',temperature:'neutral',opacity:'M',family:'',tone:'',hex:'#C47080',healedHex:'#D88898',masstone:'#A05060',midtone:'#C47080',basetone:'#D88898',mastoneName:'',midtoneName:'',bastoneName:'',ciIngredients:[],bestUse:[],healedResult:'',skinMatch:{fair:'',medium:'',olive:'',dark:''},mixPairing:[],caution:'',sessionNotes:'',proData:''};
  PMU_COLORS.unshift(c); editingId=id; saveManagedColors(); refreshAdminSelect(); render(); openEditor(id);
}
function duplicateColor(){
  const c = findColor(editingId); if(!c) return;
  const n = deepClone(c); n.id = uniqueId(c.id+'-copy'); n.name = (n.name||'Color')+' Copy';
  PMU_COLORS.unshift(n); editingId=n.id; saveManagedColors(); refreshAdminSelect(); render(); openEditor(n.id);
}
function deleteColor(){
  const c = findColor(editingId); if(!c) return;
  if(!confirm('이 컬러를 삭제할까? 삭제 후에도 전체 초기화로 원본 복구는 가능해.')) return;
  PMU_COLORS = PMU_COLORS.filter(x=>x.id!==c.id);
  delete stockData[c.id]; saveStock(stockData); saveManagedColors();
  editingId = PMU_COLORS[0] && PMU_COLORS[0].id;
  refreshAdminSelect(); render(); if(editingId) openEditor(editingId);
}
function exportColors(){
  const blob = new Blob([JSON.stringify(PMU_COLORS,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'natural-brows-color-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importColors(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error('JSON은 배열이어야 함');
      PMU_COLORS = data; editingId = PMU_COLORS[0] && PMU_COLORS[0].id;
      saveManagedColors(); refreshAdminSelect(); render(); if(editingId) openEditor(editingId);
    }catch(e){ alert('Import 실패: JSON 파일 형식을 확인해줘.'); }
  };
  reader.readAsText(file);
  input.value='';
}
function resetAllColors(){
  if(!confirm('브라우저에 저장된 모든 수정사항을 지우고 원본 데이터로 돌아갈까?')) return;
  localStorage.removeItem(ADMIN_DATA_KEY);
  PMU_COLORS = deepClone(DEFAULT_COLORS_CACHE || PMU_COLORS);
  editingId = PMU_COLORS[0] && PMU_COLORS[0].id;
  refreshAdminSelect(); render(); if(editingId) openEditor(editingId);
}

function escapeHTML(str){
  if(!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
// Safe text: use textContent to avoid any injection (returns DOM-safe string)
function safeText(str){
  if(!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

  const open = body.classList.toggle('open');

  state.search=input.value;

  state.search='';
  document.getElementById('search').value='';

function toggleChip(btn){
  const filter=btn.dataset.filter, val=btn.dataset.val;
  const active=btn.classList.contains('active');
  document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(b=>b.classList.remove('active'));
  if(!active){ btn.classList.add('active'); state[filter]=val; }
  else { state[filter]=null; }
  render();
}
function buildBrandChips(){
  const brands=[...new Set(PMU_COLORS.filter(c=>c.active).map(c=>c.brand))].sort();
  const wrap=document.getElementById('chips-brand');
  brands.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='chip'; btn.dataset.filter='brand'; btn.dataset.val=b;
    btn.textContent=b.replace(' x Perma Blend','').replace('Perma Blend','PB');
    btn.onclick=function(){
      const active=this.classList.contains('active');
      document.querySelectorAll('.chip[data-filter="brand"]').forEach(x=>x.classList.remove('active'));
      if(!active){ this.classList.add('active'); state.brand=b; }
      else { state.brand=null; }
      render();
    };
    wrap.appendChild(btn);
  });
}

document.addEventListener('click', function(e){
  var fab = e.target.closest && e.target.closest('.admin-fab');
  if(fab){ e.preventDefault(); e.stopPropagation(); window.NBAdminOpen(); return; }
  var cardBtn = e.target.closest && e.target.closest('.admin-edit-card');
  if(cardBtn){
    e.preventDefault(); e.stopPropagation();
    var card = cardBtn.closest('.sc-card,.pro-card');
    var id = '';
    if(card && card.id){ id = card.id.replace(/^sc-|^pc-/,''); }
    if(!id){
      var name = card && card.querySelector('.sc-name,.pro-name');
      var color = PMU_COLORS.find(function(c){ return name && c.name === name.textContent.trim(); });
      id = color && color.id;
    }
    if(id) window.NBAdminEdit(id); else window.NBAdminOpen();
  }
}, true);

// Make sure UI exists after load. Button still opens manually; panel will not auto-open.
setTimeout(function(){ try{ ensureAdminUI(); }catch(e){} }, 300);

render();
</script>
</body>
</html>
